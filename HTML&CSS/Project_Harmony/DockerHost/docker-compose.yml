
services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    restart: unless-stopped

  php:
    image: bitnami/php-fpm:latest
    volumes:
      - ./src:/var/www/html
    environment:
      - DB_HOST=host.docker.internal
      - DB_USER=root
      - DB_PASS=root
      - DB_NAME=vladyslavshusharin
    restart: unless-stopped

